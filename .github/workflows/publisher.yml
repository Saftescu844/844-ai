name: Auto-Publisher 844-ai.ro

on:
  schedule:
    # RSS general - 07:00 România = 05:00 UTC
    - cron: '0 5 * * *'
    # Medical - 13:00 România = 11:00 UTC
    - cron: '0 11 * * *'
    # Afaceri - 19:00 România = 17:00 UTC
    - cron: '0 17 * * *'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalează dependențe
        run: npm ci

      - name: Determină care publisher rulează (pe baza orei)
        id: decide
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "05" ]; then
            echo "script=publish-rss.ts" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" = "11" ]; then
            echo "script=publish-health.ts" >> "$GITHUB_OUTPUT"
          else
            echo "script=publish-business.ts" >> "$GITHUB_OUTPUT"
          fi

      - name: Rulează publisher-ul
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
        run: npx tsx ${{ steps.decide.outputs.script }}
