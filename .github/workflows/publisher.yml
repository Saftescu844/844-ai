name: Auto-Publisher 844-ai.ro

on:
  schedule:
    # RSS general - 07:00 România = 05:00 UTC
    - cron: '0 5 * * *'
    # Medical - 11:00 România (vara) = 08:00 UTC ... folosim ora fixă existentă: 13:00 România = 11:00 UTC
    - cron: '0 11 * * *'
    # Educație - 15:00 România = 13:00 UTC
    - cron: '0 13 * * *'
    # Afaceri - 19:00 România = 17:00 UTC
    - cron: '0 17 * * *'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalează dependențe
        run: npm ci

      - name: Determină care publisher rulează (pe baza cron-ului declanșator, nu a orei curente)
        id: decide
        run: |
          echo "Cron declanșator: ${{ github.event.schedule }}"
          case "${{ github.event.schedule }}" in
            "0 5 * * *") echo "script=publish-rss.ts" >> "$GITHUB_OUTPUT" ;;
            "0 11 * * *") echo "script=publish-health.ts" >> "$GITHUB_OUTPUT" ;;
            "0 13 * * *") echo "script=publish-education.ts" >> "$GITHUB_OUTPUT" ;;
            "0 17 * * *") echo "script=publish-business.ts" >> "$GITHUB_OUTPUT" ;;
            *) echo "script=publish-rss.ts" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Rulează publisher-ul
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
        run: npx tsx ${{ steps.decide.outputs.script }}
